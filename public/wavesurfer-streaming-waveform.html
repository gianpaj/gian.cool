<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Streaming waveform demo — wavesurfer.js</title>
    <style>
    :root {
      color-scheme: light dark;
      --bg: #ffffff;
      --fg: #1a1a1a;
      --muted: #6b7280;
      --border: #e5e7eb;
      --accent: #8b5cf6;
      --wave: #b8b8b8;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f0f11;
        --fg: #ececec;
        --muted: #9ca3af;
        --border: #26262b;
        --wave: #6b7280;
      }
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font:
        14px / 1.5 ui-sans-serif,
        system-ui,
        -apple-system,
        sans-serif;
      background: var(--bg);
      color: var(--fg);
      display: flex;
      justify-content: center;
      padding: 16px;
    }
    .card {
      width: 100%;
      max-width: 460px;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    button {
      flex: none;
      width: 44px;
      height: 44px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--fg);
      cursor: pointer;
      font-size: 16px;
      display: grid;
      place-items: center;
    }
    button:hover {
      background: color-mix(in srgb, var(--fg) 8%, transparent);
    }
    button:disabled {
      opacity: 0.4;
      cursor: default;
    }
    .wave {
      flex: 1;
      min-width: 0;
    }
    .status {
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
      min-height: 1.2em;
    }
    .hint {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="row">
        <button id="play" title="Play / pause">▶</button>
        <div class="wave" id="wave"></div>
      </div>
      <div class="status" id="status">
        Press play to stream a synthesized clip.
      </div>
      <div class="hint">
        The waveform fills left→right as audio "arrives", the played part is
        coloured, and audio plays live via Web Audio — no file is downloaded.
      </div>
    </div>

    <script type="module">
    import WaveSurfer from 'https://esm.sh/wavesurfer.js@7.12.4';

    const SAMPLE_RATE = 24_000;
    const SAMPLES_PER_PEAK = 512;
    const CHUNK_SAMPLES = 960; // ~40ms — like a TTS provider's stream chunks
    const CLIP_SECONDS = 6;

    const statusEl = document.getElementById('status');
    const playBtn = document.getElementById('play');

    // ── wavesurfer: one instance, render from peaks (no media element) ───────
    const ws = WaveSurfer.create({
      container: '#wave',
      height: 56,
      waveColor: getCSS('--wave'),
      progressColor: getCSS('--accent'),
      cursorColor: 'transparent',
      barGap: 2,
      barRadius: 2,
      barWidth: 2,
      peaks: [[0, 0]],
      duration: 1,
    });
    function getCSS(name) {
      return getComputedStyle(document.documentElement)
        .getPropertyValue(name)
        .trim();
    }

    // ── a signed-peak-per-bin accumulator (same idea as the real app) ────────
    class PeakAccumulator {
      peaks = [];
      #peak = 0;
      #count = 0;
      samples = 0;
      push(float32) {
        for (const v of float32) {
          if (Math.abs(v) > Math.abs(this.#peak)) this.#peak = v;
          if (++this.#count >= SAMPLES_PER_PEAK) {
            this.peaks.push(this.#peak);
            this.#peak = 0;
            this.#count = 0;
          }
        }
        this.samples += float32.length;
      }
      snapshot() {
        return this.#count > 0 ? [...this.peaks, this.#peak] : [...this.peaks];
      }
    }

    // ── synthesize a pleasant arpeggio as 16-bit PCM (stands in for TTS) ──────
    function synthClip() {
      const n = CLIP_SECONDS * SAMPLE_RATE;
      const pcm = new Int16Array(n);
      const notes = [261.63, 329.63, 392.0, 523.25, 392.0, 329.63];
      const noteDur = CLIP_SECONDS / notes.length;
      for (let i = 0; i < n; i++) {
        const t = i / SAMPLE_RATE;
        const idx = Math.min(notes.length - 1, Math.floor(t / noteDur));
        const env = Math.exp(-((t % noteDur) * 3));
        const s = Math.sin(2 * Math.PI * notes[idx] * t) * env * 0.4;
        pcm[i] = Math.max(-1, Math.min(1, s)) * 32_767;
      }
      // split into stream-sized chunks
      const chunks = [];
      for (let off = 0; off < n; off += CHUNK_SAMPLES) {
        chunks.push(pcm.subarray(off, Math.min(off + CHUNK_SAMPLES, n)));
      }
      return chunks;
    }

    // ── state ────────────────────────────────────────────────────────────────
    let ctx = null;
    let nextStart = 0;
    let startTime = 0;
    let acc = null;
    let playing = false;
    let phase = 'idle'; // idle | streaming | done

    function reset() {
      try {
        ctx?.close();
      } catch {}
      ctx = null;
      acc = new PeakAccumulator();
      playing = false;
      phase = 'idle';
    }

    async function start() {
      reset();
      const chunks = synthClip();
      ctx = new AudioContext({ sampleRate: SAMPLE_RATE });
      if (ctx.state === 'suspended') await ctx.resume();
      nextStart = ctx.currentTime;
      startTime = ctx.currentTime;
      phase = 'streaming';
      playing = true;
      playBtn.textContent = '⏸';
      renderLoop();

      // feed chunks faster than real time, like a server stream
      let i = 0;
      const timer = setInterval(() => {
        if (phase !== 'streaming') {
          clearInterval(timer);
          return;
        }
        const chunk = chunks[i++];
        if (!chunk) {
          clearInterval(timer);
          phase = 'done';
          statusEl.textContent = 'Stream complete — replay any time.';
          return;
        }
        pushChunk(chunk);
      }, 20); // 2× real time
    }

    function pushChunk(int16) {
      // decode to float
      const f = new Float32Array(int16.length);
      for (let j = 0; j < int16.length; j++) f[j] = int16[j] / 32_768;
      acc.push(f);
      // schedule for live playback
      const buf = ctx.createBuffer(1, f.length, SAMPLE_RATE);
      buf.copyToChannel(f, 0);
      const src = ctx.createBufferSource();
      src.buffer = buf;
      src.connect(ctx.destination);
      const at = Math.max(ctx.currentTime, nextStart);
      src.start(at);
      nextStart = at + buf.duration;
    }

    // ── render the growing waveform + progress (~6–7×/sec) ───────────────────
    let lastUpdate = 0;
    let loading = false;
    function renderLoop() {
      const now = performance.now();
      if (!loading && now - lastUpdate > 150 && acc && acc.peaks.length >= 0) {
        const peaks = acc.snapshot();
        const generated = acc.samples / SAMPLE_RATE;
        if (peaks.length > 0 && generated > 0) {
          // pad to the (here, known) total so it grows left→right
          const total = CLIP_SECONDS;
          const binsPerSec = peaks.length / generated;
          const targetBins = Math.ceil(total * binsPerSec);
          const padded =
            targetBins > peaks.length
              ? peaks.concat(new Array(targetBins - peaks.length).fill(0))
              : peaks;
          const played = ctx ? Math.min(ctx.currentTime - startTime, total) : 0;
          lastUpdate = now;
          loading = true;
          // setOptions({ peaks }) does NOT re-decode — load() does.
          ws.load('', [padded], total)
            .then(() => ws.setTime(played))
            .catch(() => {})
            .finally(() => {
              loading = false;
            });
          if (phase === 'streaming') {
            statusEl.textContent = `streaming… ${generated.toFixed(1)}s generated, ${played.toFixed(1)}s played`;
          }
        }
      }
      if (
        phase === 'streaming' ||
        (ctx && ctx.currentTime - startTime < CLIP_SECONDS)
      ) {
        requestAnimationFrame(renderLoop);
      }
    }

    playBtn.addEventListener('click', () => {
      if (phase === 'idle' || phase === 'done') {
        start();
      } else if (ctx) {
        if (ctx.state === 'running') {
          ctx.suspend();
          playing = false;
          playBtn.textContent = '▶';
        } else {
          ctx.resume();
          playing = true;
          playBtn.textContent = '⏸';
        }
      }
    });
    </script>
  </body>
</html>
